version: "3.9"
services:   
      
  api:
    build: .
    container_name: api-go
    env_file:
      - ./.env.production
    restart: always
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Bangkok            
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: db-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
